<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IMSF — Connexion Admin</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="theme.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
  <main class="login-page">
    <section class="bg-animate-gradient" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1.25rem;">
      
      <div class="shape-blob shape-1"></div>
      <div class="shape-blob shape-2"></div>

      <div class="glass-panel" style="padding: 3rem 2.5rem; width: 100%; max-width: 440px; position: relative; z-index: 10;">
        <div style="text-align: center; margin-bottom: 2rem;">
          <div class="logo animate" style="font-size: 2.5rem; margin-bottom: 0.5rem;">IMSF Admin</div>
          <h1 style="margin: 0; font-size: 1.5rem; color: var(--dark); font-weight: 800;">Accès Sécurisé</h1>
          <p style="color: var(--muted); margin-top: 0.5rem;">Veuillez vous identifier pour gérer l'établissement</p>
        </div>

        <form id="adminLoginForm" class="contact-form" style="grid-template-columns: 1fr; gap: 1.5rem;">
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--dark); font-size: 0.9rem;">Identifiant Admin</label>
            <div style="position: relative;">
              <input type="text" name="adminUser" placeholder="Nom d'utilisateur" required class="input-modern">
              <span class="input-icon" style="color: var(--accent-1);">👤</span>
            </div>
          </div>

          <div class="form-group">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--dark); font-size: 0.9rem;">Mot de passe</label>
            <div style="position: relative;">
              <input type="password" name="adminPass" placeholder="••••••••" required class="input-modern">
              <span class="input-icon" style="color: var(--accent-1);">🔒</span>
            </div>
          </div>

          <div id="loginError" style="color: #ef4444; font-size: 0.85rem; text-align: center; display: none;">
            Identifiants incorrects. Veuillez réessayer.
          </div>

          <button class="btn btn-submit" type="submit" style="width: 100%; margin-top: 1rem; padding: 1rem; border-radius: 14px; font-size: 1.1rem; background: linear-gradient(135deg, #1e293b, #0f172a);">
            Se connecter à l'administration
          </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
          <a href="index.html" style="color: var(--muted); text-decoration: none;">← Retour au site public</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    // Simulation simple pour la démo
    // Identifiants par défaut : admin / admin
  </script>
  <script src="admin-login.js"></script>
</body>
</html>
